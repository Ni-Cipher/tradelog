<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TradeLog">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>TradeLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8e8;
      --text-sec: #cccccc;
      --text-sub: #666666;
      --text-dim: #444444;
      --muted: #555555;
      --nav-bg: rgba(10,10,15,0.97);
      --btn-bg: rgba(255,255,255,0.06);
      --btn-color: #cccccc;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.10);
      --toggle-bg: rgba(255,255,255,0.08);
      --toggle-icon-bg: rgba(255,255,255,0.15);
      --accent: #7c3aed;
      --accent-l: #a78bfa;
      --green: #34C759; --red: #FF453A; --gold: #FFD60A;
    }
    html[data-theme="light"] {
      --bg: #f0f2f8;
      --surface: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.09);
      --text: #12121e;
      --text-sec: #2c2c3e;
      --text-sub: #7a7a8c;
      --text-dim: #aaaabc;
      --muted: #8888a0;
      --nav-bg: rgba(240,242,248,0.97);
      --btn-bg: rgba(0,0,0,0.06);
      --btn-color: #333344;
      --input-bg: rgba(0,0,0,0.05);
      --input-border: rgba(0,0,0,0.12);
      --toggle-bg: rgba(0,0,0,0.07);
      --toggle-icon-bg: rgba(0,0,0,0.12);
      --accent: #6d28d9;
      --accent-l: #5b21b6;
    }
    html { transition: background .25s, color .25s; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden; }
    #app { max-width: 430px; margin: 0 auto; height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.09) 0%, transparent 55%);
      transition: background .25s; }
    html[data-theme="light"] #app { background-image: radial-gradient(ellipse at 50% 0%, rgba(109,40,217,0.07) 0%, transparent 55%); }
    /* Header */
    .hdr { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: transparent; }
    .hdr-row { display: flex; align-items: center; justify-content: space-between; }
    .app-name { font-size: 11px; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; font-weight: 700; }
    .total-pnl { font-size: 22px; font-weight: 700; margin-top: 2px; font-family: 'DM Mono', monospace; }
    .trade-cnt { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
    /* Theme Toggle */
    .theme-toggle { background: var(--toggle-bg); border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 6px; display: flex; align-items: center; gap: 2px; cursor: pointer; transition: all .25s;
      -webkit-tap-highlight-color: transparent; }
    .tgl-opt { width: 28px; height: 26px; border-radius: 15px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; transition: background .2s; border: none; background: none; cursor: pointer; }
    .tgl-opt.tgl-active { background: var(--toggle-icon-bg); }
    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* Nav */
    .nav { display: flex; border-top: 1px solid var(--border); background: var(--nav-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      padding: 8px 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); flex-shrink: 0; }
    .nbtn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; color: var(--muted); font-family: inherit;
      padding: 4px 0; -webkit-tap-highlight-color: transparent; }
    .nbtn.active { color: var(--accent-l); }
    .nicon { font-size: 18px; line-height: 1.2; }
    .nlabel { font-size: 10px; letter-spacing: .04em; }
    .nbtn.log-btn .nicon { background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 300; color: #fff; box-shadow: 0 4px 16px rgba(79,70,229,.45); }
    /* Cards */
    .stat-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .scard { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; }
    .slabel { font-size: 10px; color: var(--text-sub); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .sval { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
    /* Calendar */
    .cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    .cal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav-btn { background: var(--btn-bg); border: none; color: var(--btn-color); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 16px; }
    .cal-month { font-size: 13px; font-weight: 600; color: var(--text-sec); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-dh { text-align: center; font-size: 10px; color: var(--text-dim); font-weight: 600; padding-bottom: 4px; }
    .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid transparent; }
    .cal-dn { font-size: 11px; }
    .cal-pnl { font-size: 7px; color: rgba(255,255,255,.7); margin-top: 1px; }
    html[data-theme="light"] .cal-pnl { color: rgba(0,0,0,.6); }
    /* AI Panel */
    .ai-panel { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    html[data-theme="light"] .ai-panel { background: rgba(109,40,217,.06); border-color: rgba(109,40,217,.18); }
    .ai-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .ai-title { font-size: 13px; font-weight: 700; color: var(--accent-l); }
    .ai-btn { background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.4); color: var(--accent-l);
      font-size: 11px; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-weight: 600; font-family: inherit; }
    html[data-theme="light"] .ai-btn { background: rgba(109,40,217,.12); border-color: rgba(109,40,217,.3); }
    .ai-text { font-size: 13px; color: var(--text-sec); line-height: 1.75; white-space: pre-line; }
    .ai-empty { font-size: 12px; color: var(--muted); font-style: italic; }
    .ai-link { font-size: 12px; color: var(--accent); text-decoration: none; display: block; margin-top: 8px; }
    /* Form */
    .fg { margin-bottom: 16px; }
    .fl { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 7px; display: block; }
    input, textarea { background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 15px; width: 100%;
      outline: none; font-family: inherit; -webkit-appearance: none; transition: border-color .15s; }
    input:focus, textarea:focus { border-color: rgba(124,58,237,.5); }
    textarea { resize: none; min-height: 80px; }
    .row2 { display: flex; gap: 10px; }
    .row2 > * { flex: 1; min-width: 0; }
    /* Direction */
    .dir-row { display: flex; gap: 10px; }
    .dbtn { flex: 1; padding: 11px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: inherit; transition: all .15s; }
    .dbtn.long-on { background: rgba(52,199,89,.2); border-color: #34C759; color: #34C759; }
    .dbtn.short-on { background: rgba(255,69,58,.2); border-color: #FF453A; color: #FF453A; }
    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { padding: 7px 12px; border-radius: 10px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: inherit; transition: all .15s; }
    .pill.sa { background: rgba(167,139,250,.2); border-color: #a78bfa; color: #a78bfa; }
    .pill.ea { background: rgba(255,214,10,.15); border-color: rgba(255,214,10,.5); color: var(--gold); }
    html[data-theme="light"] .pill.sa { background: rgba(109,40,217,.12); border-color: var(--accent); color: var(--accent); }
    /* PnL Preview */
    .pnl-prev { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; text-align: center; display: none; }
    .pnl-prev-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
    /* Buttons */
    .save-btn { width: 100%; padding: 16px; border-radius: 14px; background: linear-gradient(135deg,#4f46e5,#7c3aed);
      border: none; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      letter-spacing: .02em; transition: opacity .2s; -webkit-tap-highlight-color: transparent; }
    .save-btn:active { opacity: .8; }
    .sec-btn { width: 100%; padding: 13px; border-radius: 12px; background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3); color: var(--accent-l); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    html[data-theme="light"] .sec-btn { background: rgba(109,40,217,.10); border-color: rgba(109,40,217,.25); }
    /* Trade cards */
    .tc { border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
    .tc-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .tc-sym { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: .02em; }
    .tc-dir { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; margin-left: 8px; vertical-align: middle; }
    .tc-meta { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
    .tc-pnl { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .tc-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tc-tag { font-size: 11px; background: var(--surface); border-radius: 6px; padding: 3px 8px; color: var(--muted); border: 1px solid var(--border); }
    .tc-note { font-size: 11px; color: var(--text-sub); font-style: italic; }
    .del-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; margin-top: 4px; font-family: inherit; }
    /* Settings */
    .set-sect { margin-bottom: 24px; }
    .set-title { font-size: 13px; font-weight: 700; color: var(--accent-l); margin-bottom: 10px; }
    .set-hint { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 12px; }
    /* Misc */
    .err { color: var(--red); font-size: 12px; margin-bottom: 12px; }
    .ok { color: var(--green); font-size: 12px; margin-top: 8px; }
    .stitle { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .ssub { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-on { background: var(--green); }
    .dot-off { background: var(--red); }
    .spacer { height: 16px; }
    /* Light mode trade card bg override */
    html[data-theme="light"] .tc { background: rgba(255,255,255,0.7) !important; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const EMOTIONS = ['😤 Revenge','😰 Fear','🤑 Greedy','😌 Calm','🎯 Focused','😴 Tired'];
const SETUPS = ['Breakout','Reversal','Trend Follow','Scalp','News Play','Support/Res'];
const DAYS_H = ['Su','Mo','Tu','We','Th','Fr','Sa'];

// ── State ────────────────────────────────────────────────────────────────────
let S = {
  tab: 'dashboard', trades: [], apiKey: '', theme: 'dark',
  calY: new Date().getFullYear(), calM: new Date().getMonth(),
  dir: 'LONG', setup: '', emotion: '', formErr: '',
  aiText: '', aiLoading: false, aiErr: '',
};

// ── Storage ──────────────────────────────────────────────────────────────────
function persist() {
  localStorage.setItem('tl-trades', JSON.stringify(S.trades));
  localStorage.setItem('tl-key', S.apiKey);
  localStorage.setItem('tl-theme', S.theme);
}
function hydrate() {
  try { S.trades = JSON.parse(localStorage.getItem('tl-trades') || '[]'); } catch { S.trades = []; }
  S.apiKey = localStorage.getItem('tl-key') || '';
  S.theme = localStorage.getItem('tl-theme') || 'dark';
  applyTheme(S.theme);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t==='light' ? '#f0f2f8' : '#0a0a0f');
}

// ── Utils ────────────────────────────────────────────────────────────────────
const money = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Stats ────────────────────────────────────────────────────────────────────
function stats() {
  const t = S.trades;
  const wins = t.filter(x => x.pnl >= 0), losses = t.filter(x => x.pnl < 0);
  const total = t.reduce((s,x) => s+x.pnl, 0);
  const wr = t.length ? (wins.length/t.length)*100 : 0;
  const aw = wins.length ? wins.reduce((s,x)=>s+x.pnl,0)/wins.length : 0;
  const al = losses.length ? losses.reduce((s,x)=>s+x.pnl,0)/losses.length : 0;
  const rr = al !== 0 ? Math.abs(aw/al) : 0;
  return {total, wr, aw, al, rr, wc: wins.length, lc: losses.length, n: t.length};
}

// ── Sparkline ────────────────────────────────────────────────────────────────
function sparkline(totalPnl) {
  const pts = [...S.trades].reverse().slice(0,12).reverse();
  if (pts.length < 2) return '<svg width="90" height="36"></svg>';
  let run = 0;
  const vals = pts.map(t => { run += t.pnl; return run; });
  const mx = Math.max(...vals), mn = Math.min(...vals);
  const rng = mx - mn || 1;
  const W = 90, H = 36;
  const coords = vals.map((v,i) => `${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(' ');
  const c = totalPnl >= 0 ? '#34C759' : '#FF453A';
  return `<svg width="${W}" height="${H}" style="overflow:visible"><polyline points="${coords}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// ── Calendar ─────────────────────────────────────────────────────────────────
function calendar() {
  const {calY: y, calM: m} = S;
  const byDay = {};
  S.trades.forEach(t => {
    const d = new Date(t.date);
    if (d.getFullYear()===y && d.getMonth()===m) {
      const day = d.getDate();
      byDay[day] = (byDay[day]||0) + t.pnl;
    }
  });
  const days = new Date(y,m+1,0).getDate();
  const first = new Date(y,m,1).getDay();
  const name = new Date(y,m).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const now = new Date();

  let h = DAYS_H.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for(let i=0;i<first;i++) h += '<div></div>';
  for(let d=1;d<=days;d++) {
    const pnl = byDay[d];
    const isToday = d===now.getDate() && m===now.getMonth() && y===now.getFullYear();
    let bg = 'rgba(255,255,255,0.03)';
    if(pnl!=null){ const a=Math.min(0.72,0.15+Math.abs(pnl)/400); bg = pnl>=0?`rgba(52,199,89,${a})`:`rgba(255,69,58,${a})`; }
    const bdr = isToday ? '1px solid rgba(255,215,0,0.55)' : '1px solid transparent';
    const pnlH = pnl!=null ? `<div class="cal-pnl">${pnl>=0?'+':''}${(pnl/1000).toFixed(1)}k</div>` : '';
    h += `<div class="cal-cell" style="background:${bg};border:${bdr}"><div class="cal-dn" style="color:${pnl!=null?'#fff':'#444'};font-weight:${isToday?700:400}">${d}</div>${pnlH}</div>`;
  }
  return `<div class="cal-wrap">
    <div class="cal-hdr">
      <button class="cal-nav-btn" data-a="cal-prev">‹</button>
      <span class="cal-month">${name}</span>
      <button class="cal-nav-btn" data-a="cal-next">›</button>
    </div>
    <div class="cal-grid">${h}</div>
  </div>`;
}

// ── Views ─────────────────────────────────────────────────────────────────────
function vDashboard() {
  const s = stats();
  const wc = s.wr>=50?'#34C759':'#FF453A';
  const online = navigator.onLine;
  const canAI = online && S.apiKey && !S.aiLoading;
  const aiLabel = S.aiLoading ? 'Analyzing…' : !S.apiKey ? 'Set API Key' : !online ? 'Offline' : 'Analyze';
  const aiBody = S.aiLoading
    ? '<div class="ai-empty">✦ Analyzing your trades…</div>'
    : S.aiText
      ? `<div class="ai-text">${esc(S.aiText)}</div>`
      : S.aiErr
        ? `<div class="err">${esc(S.aiErr)}</div>`
        : '<div class="ai-empty">Tap "Analyze" for AI-powered coaching on your patterns.</div>';
  const noKey = !S.apiKey ? `<a class="ai-link" data-a="go-settings" href="#">→ Add your Anthropic API key in Settings</a>` : '';

  return `
  <div class="stat-row">
    <div class="scard"><div class="slabel">Win Rate</div><div class="sval" style="color:${wc}">${s.wr.toFixed(1)}%</div></div>
    <div class="scard"><div class="slabel">R:R Ratio</div><div class="sval" style="color:#a78bfa">${s.rr.toFixed(2)}</div></div>
  </div>
  <div class="stat-row">
    <div class="scard"><div class="slabel">Avg Win</div><div class="sval" style="font-size:15px;color:#34C759">${money(s.aw)}</div></div>
    <div class="scard"><div class="slabel">Avg Loss</div><div class="sval" style="font-size:15px;color:#FF453A">${money(s.al)}</div></div>
  </div>
  ${calendar()}
  <div class="ai-panel">
    <div class="ai-hdr">
      <div class="ai-title">✦ AI Coach</div>
      <button class="ai-btn" data-a="ai-go" ${canAI?'':'disabled'} style="opacity:${canAI?1:0.5}">${aiLabel}</button>
    </div>
    ${aiBody}${noKey}
  </div>`;
}

function vLog() {
  const spills = SETUPS.map(s=>`<button class="pill ${S.setup===s?'sa':''}" data-a="setup" data-v="${esc(s)}">${s}</button>`).join('');
  const epills = EMOTIONS.map(e=>`<button class="pill ${S.emotion===e?'ea':''}" data-a="emotion" data-v="${esc(e)}">${e}</button>`).join('');
  return `
  <div class="stitle">Log a Trade</div><div class="spacer"></div>
  <div class="fg"><label class="fl">Symbol</label>
    <input id="fi-sym" placeholder="EURUSD, AAPL, BTC, SPY…" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase">
  </div>
  <div class="fg"><label class="fl">Direction</label>
    <div class="dir-row">
      <button class="dbtn ${S.dir==='LONG'?'long-on':''}" data-a="dir" data-v="LONG">▲ Long</button>
      <button class="dbtn ${S.dir==='SHORT'?'short-on':''}" data-a="dir" data-v="SHORT">▼ Short</button>
    </div>
  </div>
  <div class="fg"><div class="row2">
    <div><label class="fl">Entry Price</label><input id="fi-en" type="number" placeholder="0.00" step="any" inputmode="decimal"></div>
    <div><label class="fl">Exit Price</label><input id="fi-ex" type="number" placeholder="0.00" step="any" inputmode="decimal"></div>
  </div></div>
  <div class="fg"><div class="row2">
    <div><label class="fl">Size / Lots</label><input id="fi-sz" type="number" placeholder="1.00" step="any" inputmode="decimal"></div>
    <div><label class="fl">Date</label><input id="fi-dt" type="date" value="${today()}"></div>
  </div></div>
  <div class="fg"><label class="fl">Setup</label><div class="pills">${spills}</div></div>
  <div class="fg"><label class="fl">Emotion</label><div class="pills">${epills}</div></div>
  <div class="fg"><label class="fl">Notes</label><textarea id="fi-nt" placeholder="What happened? What could you improve?"></textarea></div>
  ${S.formErr ? `<div class="err">${esc(S.formErr)}</div>` : ''}
  <div class="pnl-prev" id="pnl-wrap"><span class="pnl-prev-val" id="pnl-val"></span> <span style="font-size:13px;color:#666">estimated P&amp;L</span></div>
  <button class="save-btn" data-a="save">Save Trade</button>
  <div style="height:24px"></div>`;
}

function vHistory() {
  if (!S.trades.length) return `<div class="stitle">Trade History</div><div class="empty"><div class="empty-icon">📋</div>No trades yet.<br>Log your first trade!</div>`;
  const cards = S.trades.map(t => {
    const w = t.pnl >= 0;
    const ac = w ? '#34C759' : '#FF453A';
    const dc = t.direction==='LONG' ? '#34C759' : '#FF453A';
    const db = t.direction==='LONG' ? 'rgba(52,199,89,.15)' : 'rgba(255,69,58,.15)';
    const dt = new Date(t.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const tags = [t.emotion && `<span class="tc-tag">${esc(t.emotion)}</span>`, t.notes && `<span class="tc-note">${esc(t.notes)}</span>`].filter(Boolean).join('');
    return `<div class="tc" style="background:rgba(255,255,255,.035);border:1px solid ${w?'rgba(52,199,89,.2)':'rgba(255,69,58,.2)'};border-left:3px solid ${ac}">
      <div class="tc-top">
        <div>
          <div><span class="tc-sym">${esc(t.symbol)}</span><span class="tc-dir" style="color:${dc};background:${db}">${t.direction}</span></div>
          <div class="tc-meta">${dt}${t.setup?' · '+esc(t.setup):''}</div>
        </div>
        <div style="text-align:right">
          <div class="tc-pnl" style="color:${ac}">${w?'+':''}${money(t.pnl)}</div>
          <button class="del-btn" data-a="del" data-id="${t.id}">remove</button>
        </div>
      </div>
      ${tags?`<div class="tc-tags">${tags}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="stitle">Trade History</div><div class="ssub">${S.trades.length} trades logged</div>${cards}`;
}

function vSettings() {
  const online = navigator.onLine;
  return `
  <div class="stitle">Settings</div><div class="spacer"></div>
  <div class="set-sect">
    <div class="set-title">🤖 AI Coach — API Key</div>
    <div class="set-hint">The AI Coach uses Claude (Anthropic) to analyze your trades when you're online. You need a personal API key — it's free to get started.<br><br>
      <strong>Steps:</strong><br>
      1. Go to <strong>console.anthropic.com</strong><br>
      2. Sign up / log in<br>
      3. Go to API Keys → Create Key<br>
      4. Paste it below
    </div>
    <div class="fg"><label class="fl">Anthropic API Key</label>
      <input id="si-key" type="password" placeholder="sk-ant-…" value="${esc(S.apiKey)}" autocomplete="off">
    </div>
    <button class="sec-btn" data-a="save-key">Save API Key</button>
    ${S.apiKey ? '<div class="ok">✓ API key saved — AI Coach is ready!</div>' : ''}
  </div>
  <div class="set-sect">
    <div class="set-title">📡 Status</div>
    <div style="font-size:13px;color:#aaa;line-height:1.7">
      <span class="dot ${online?'dot-on':'dot-off'}"></span>${online ? 'Online — all features available' : 'Offline — journaling works, AI Coach needs connection'}<br>
      <span style="color:#555;font-size:11px;display:block;margin-top:6px">App is cached for offline use. Your trades are stored locally on this device.</span>
    </div>
  </div>
  <div class="set-sect">
    <div class="set-title" style="color:#FF453A">⚠ Danger Zone</div>
    <button class="sec-btn" data-a="clear" style="background:rgba(255,69,58,.1);border-color:rgba(255,69,58,.3);color:#FF453A">Clear All Trades</button>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const s = stats();
  const pc = s.total>=0?'#34C759':'#FF453A';
  const vs = {dashboard:vDashboard,log:vLog,history:vHistory,settings:vSettings};
  const tabs = [
    {id:'dashboard',icon:'◈',label:'Home'},
    {id:'log',icon:'+',label:'Log'},
    {id:'history',icon:'≡',label:'History'},
    {id:'settings',icon:'⚙',label:'Settings'},
  ];
  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-row">
        <div>
          <div class="app-name">📈 TradeLog</div>
          <div class="total-pnl" style="color:${pc}">${s.total>=0?'+':''}${money(s.total)}</div>
          <div class="trade-cnt">${s.n} trades · ${s.wr.toFixed(0)}% win rate</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${sparkline(s.total)}
          <div class="theme-toggle" data-a="theme-toggle" title="Toggle theme">
            <button class="tgl-opt ${S.theme==='dark'?'tgl-active':''}" data-a="theme-toggle" aria-label="Dark mode">🌙</button>
            <button class="tgl-opt ${S.theme==='light'?'tgl-active':''}" data-a="theme-toggle" aria-label="Light mode">☀️</button>
          </div>
        </div>
      </div>
    </div>
    <div class="content">${vs[S.tab]()}</div>
    <div class="nav">${tabs.map(t=>`
      <button class="nbtn ${t.id==='log'?'log-btn':''} ${S.tab===t.id?'active':''}" data-a="tab" data-tab="${t.id}">
        <span class="nicon">${t.icon}</span><span class="nlabel">${t.label}</span>
      </button>`).join('')}
    </div>`;

  if (S.tab === 'log') {
    ['fi-en','fi-ex','fi-sz'].forEach(id => document.getElementById(id)?.addEventListener('input', previewPnl));
  }
}

// ── PnL Preview ───────────────────────────────────────────────────────────────
function previewPnl() {
  const en = parseFloat(document.getElementById('fi-en')?.value);
  const ex = parseFloat(document.getElementById('fi-ex')?.value);
  const sz = parseFloat(document.getElementById('fi-sz')?.value);
  const wrap = document.getElementById('pnl-wrap');
  const val = document.getElementById('pnl-val');
  if (!isNaN(en)&&!isNaN(ex)&&!isNaN(sz)&&sz>0&&wrap&&val) {
    const pnl = (S.dir==='LONG'?ex-en:en-ex)*sz;
    val.textContent = `${pnl>=0?'+':''}${money(pnl)}`;
    val.style.color = pnl>=0?'#34C759':'#FF453A';
    wrap.style.display = 'block';
  }
}

// ── AI Coach ──────────────────────────────────────────────────────────────────
async function runAI() {
  if (!S.apiKey) { S.tab='settings'; render(); return; }
  if (!S.trades.length) { S.aiErr='Add some trades first!'; render(); return; }
  S.aiLoading=true; S.aiText=''; S.aiErr=''; render();
  const summary = S.trades.slice(0,20).map(t =>
    `${t.symbol} ${t.direction} | P&L: $${t.pnl.toFixed(2)} | Setup: ${t.setup||'—'} | Emotion: ${t.emotion||'—'} | Notes: ${t.notes||''}`
  ).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 700,
        messages: [{role:'user', content:`You're a professional trading coach. Analyze these recent trades. Give 3-4 punchy, specific bullet points. Focus on: patterns in wins/losses, emotional tendencies, setup performance. Be direct.\n\n${summary}`}]
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    S.aiText = d.content?.[0]?.text || 'No analysis returned.';
  } catch(e) { S.aiErr = `Error: ${e.message}`; }
  S.aiLoading = false; render();
}

// ── Event Delegation ──────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;
  e.preventDefault();

  if (a==='tab') { S.tab=el.dataset.tab; render(); return; }
  if (a==='theme-toggle') {
    S.theme = S.theme==='dark' ? 'light' : 'dark';
    applyTheme(S.theme);
    persist();
    render();
    return;
  }
  if (a==='go-settings') { S.tab='settings'; render(); return; }
  if (a==='cal-prev') { S.calM===0?(S.calM=11,S.calY--):S.calM--; render(); return; }
  if (a==='cal-next') { S.calM===11?(S.calM=0,S.calY++):S.calM++; render(); return; }
  if (a==='dir') { S.dir=el.dataset.v; render(); return; }
  if (a==='setup') { S.setup=S.setup===el.dataset.v?'':el.dataset.v; render(); return; }
  if (a==='emotion') { S.emotion=S.emotion===el.dataset.v?'':el.dataset.v; render(); return; }
  if (a==='ai-go') { runAI(); return; }

  if (a==='save') {
    const sym = (document.getElementById('fi-sym')?.value||'').trim().toUpperCase();
    const en = parseFloat(document.getElementById('fi-en')?.value);
    const ex = parseFloat(document.getElementById('fi-ex')?.value);
    const sz = parseFloat(document.getElementById('fi-sz')?.value);
    const dt = document.getElementById('fi-dt')?.value || today();
    const nt = (document.getElementById('fi-nt')?.value||'').trim();
    if (!sym||isNaN(en)||isNaN(ex)||isNaN(sz)||sz<=0) { S.formErr='Fill in symbol, entry, exit & size'; render(); return; }
    const pnl = (S.dir==='LONG'?ex-en:en-ex)*sz;
    S.trades.unshift({id:Date.now(),symbol:sym,direction:S.dir,entry:en,exit:ex,size:sz,date:dt,pnl,setup:S.setup,emotion:S.emotion,notes:nt});
    S.setup=''; S.emotion=''; S.formErr='';
    persist(); S.tab='history'; render(); return;
  }

  if (a==='save-key') {
    S.apiKey = (document.getElementById('si-key')?.value||'').trim();
    persist(); render(); return;
  }

  if (a==='del') {
    if (confirm('Remove this trade?')) { S.trades=S.trades.filter(t=>t.id!==parseInt(el.dataset.id)); persist(); render(); }
    return;
  }

  if (a==='clear') {
    if (confirm('Delete ALL trades? This cannot be undone.')) { S.trades=[]; persist(); render(); }
    return;
  }
});

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// ── Online/Offline events ─────────────────────────────────────────────────────
window.addEventListener('online', () => { if(S.tab==='dashboard'||S.tab==='settings') render(); });
window.addEventListener('offline', () => { if(S.tab==='dashboard'||S.tab==='settings') render(); });

// ── Boot ──────────────────────────────────────────────────────────────────────
hydrate();
render();
</script>
</body>
</html>
